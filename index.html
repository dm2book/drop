<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DropAI</title>
  <meta name="description" content="AI-gedreven dropshipping platform">
  <meta name="theme-color" content="#070b14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DropAI">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#070b14;overflow:hidden}
    #root{height:100%;overflow:hidden}
    #boot{position:fixed;inset:0;background:#070b14;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:'Bebas Neue',sans-serif}

    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

</head>
<body>
<div id="boot">
  <div style="font-size:56px;letter-spacing:4px;color:#eef0f5">DROP<span style="color:#00e676">AI</span></div>
  <div style="font-size:13px;color:#7a8ba5;letter-spacing:2px;margin-top:6px">LADEN...</div>
  <div class="bspin"></div>
</div>
<div id="root"></div>

<script>
// PWA manifest injection
(function(){
  var icon='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="#070b14" rx="80"/><text x="256" y="340" font-family="Arial Black,sans-serif" font-size="280" font-weight="900" fill="#00e676" text-anchor="middle">D</text><rect x="40" y="390" width="432" height="10" rx="5" fill="#FFB800"/></svg>';
  var m={name:"DropAI - AI Dropshipping Tool",short_name:"DropAI",description:"AI-gedreven dropshipping platform",start_url:"./",display:"standalone",orientation:"any",background_color:"#070b14",theme_color:"#00e676",icons:[{src:"data:image/svg+xml,"+encodeURIComponent(icon),sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
  var blob=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
  var lnk=document.createElement('link');lnk.rel='manifest';lnk.href=URL.createObjectURL(blob);
  document.head.appendChild(lnk);
  var al=document.createElement('link');al.rel='apple-touch-icon';al.href="data:image/svg+xml,"+encodeURIComponent(icon);
  document.head.appendChild(al);
})();
</script>

<script type="text/babel" data-presets="react">
const { useState, useCallback } = React;

// ── API ──────────────────────────────────────────────────────────────────────
const callClaude = async (prompt, sys = "Respond with valid JSON only. No markdown, no backticks, raw JSON.") => {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: sys, messages: [{ role: "user", content: prompt }] }),
  });
  const d = await r.json();
  const raw = d.content?.[0]?.text || "{}";
  return JSON.parse(raw.replace(/```json\n?|```/g, "").trim());
};

const pexelsSearch = async (query, key, n = 6) => {
  const r = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&per_page=${n}&orientation=portrait&size=medium`, { headers: { Authorization: key } });
  const d = await r.json();
  return d.videos || [];
};

// ── Constants ────────────────────────────────────────────────────────────────
const CATS = [
  { id: "tech", label: "Tech Gadgets", icon: "⚡" },
  { id: "beauty", label: "Beauty & Skin", icon: "✨" },
  { id: "home", label: "Home & Living", icon: "🏠" },
  { id: "fitness", label: "Fitness", icon: "💪" },
  { id: "pets", label: "Huisdieren", icon: "🐾" },
  { id: "outdoor", label: "Outdoor", icon: "🌿" },
  { id: "fashion", label: "Fashion", icon: "👗" },
  { id: "kids", label: "Kids & Baby", icon: "🧸" },
];

const NAV = [
  { id: "discover", icon: "🔍", label: "Ontdekken" },
  { id: "selection", icon: "🛒", label: "Mijn Producten" },
  { id: "store", icon: "🏪", label: "Winkel Bouwen" },
  { id: "videos", icon: "📱", label: "Video's" },
];

const C = {
  bg:"#070b14", card:"rgba(255,255,255,0.04)", cardH:"rgba(255,255,255,0.07)",
  border:"rgba(255,255,255,0.08)", borderH:"rgba(255,255,255,0.2)",
  green:"#00e676", gold:"#FFB800", red:"#ff5252", purple:"#a78bfa",
  text:"#eef0f5", muted:"#7a8ba5", sidebar:"#080c17",
};

// ── Mini Components ──────────────────────────────────────────────────────────
const Pill = ({ label, color }) => (
  <span style={{ padding:"3px 8px", borderRadius:6, fontSize:10, fontWeight:700, whiteSpace:"nowrap",
    background:color+"1a", color, border:`1px solid ${color}30` }}>{label}</span>
);

const ScoreBar = ({ label, value, color }) => (
  <div style={{ flex:1 }}>
    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
      <span style={{ fontSize:9, color:C.muted, fontWeight:700 }}>{label}</span>
      <span style={{ fontSize:9, color, fontWeight:800 }}>{value}/10</span>
    </div>
    <div style={{ height:3, background:"rgba(255,255,255,0.07)", borderRadius:2 }}>
      <div style={{ height:"100%", width:`${value*10}%`, background:color, borderRadius:2 }} />
    </div>
  </div>
);

const Spinner = ({ size=32, color=C.green }) => (
  <div style={{ width:size, height:size, borderRadius:"50%",
    border:`2.5px solid ${color}25`, borderTop:`2.5px solid ${color}`,
    animation:"bsp .8s linear infinite", margin:"0 auto" }} />
);

const Btn = ({ children, onClick, color=C.green, full, sm, disabled, style:sx }) => {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ width:full?"100%":undefined, padding:sm?"7px 14px":"11px 22px",
        borderRadius:sm?8:12, border:`1px solid ${color}40`,
        background:hov&&!disabled?`${color}26`:`${color}16`,
        color:disabled?C.muted:color, fontSize:sm?11:13, fontWeight:700,
        cursor:disabled?"not-allowed":"pointer", opacity:disabled?.5:1,
        transition:"all .15s", ...sx }}>{children}</button>
  );
};

// ── Product Card ─────────────────────────────────────────────────────────────
const ProductCard = ({ p, selected, onToggle, onDetail }) => {
  const [hov, setHov] = useState(false);
  const pc = p.profitMargin>=60?C.green:p.profitMargin>=40?C.gold:C.red;
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={onDetail}
      style={{ background:selected?"rgba(0,230,118,0.06)":hov?C.cardH:C.card,
        border:`1px solid ${selected?"rgba(0,230,118,0.35)":hov?C.borderH:C.border}`,
        borderRadius:16, padding:20, cursor:"pointer", transition:"all .18s",
        position:"relative", display:"flex", flexDirection:"column", gap:10 }}>
      {selected && <div style={{ position:"absolute",top:12,right:12,background:C.green,
        borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",
        justifyContent:"center",fontSize:11,color:"#000",fontWeight:900 }}>✓</div>}
      <div style={{ fontSize:32 }}>{p.emoji}</div>
      <div>
        <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:19,color:C.text,letterSpacing:1 }}>{p.name}</div>
        <div style={{ fontSize:12,color:C.muted,lineHeight:1.5,marginTop:2 }}>{p.tagline}</div>
      </div>
      <div style={{ display:"flex",gap:5,flexWrap:"wrap" }}>
        <Pill label={`Inkoop €${p.buyPrice}`} color={C.muted} />
        <Pill label={`Prijs €${p.sellPrice}`} color={C.gold} />
        <Pill label={`${p.profitMargin}% marge`} color={pc} />
      </div>
      <div style={{ display:"flex",gap:8 }}>
        <ScoreBar label="WOW" value={p.wowScore} color={C.green} />
        <ScoreBar label="TREND" value={p.trendScore} color={C.gold} />
      </div>
      <div style={{ display:"flex",gap:8,marginTop:2 }}>
        <Btn sm onClick={e=>{e.stopPropagation();onToggle();}} color={selected?C.green:C.text} style={{flex:1}}>
          {selected?"✓ Geselecteerd":"+ Selecteer"}
        </Btn>
        <Btn sm onClick={e=>{e.stopPropagation();onDetail();}} color={C.muted}>Details →</Btn>
      </div>
    </div>
  );
};

// ── Product Modal ────────────────────────────────────────────────────────────
const ProductModal = ({ product, related, loadingRel, selected, selectedProducts, onToggle, onAddRelated, onClose }) => {
  const pc = product.profitMargin>=60?C.green:product.profitMargin>=40?C.gold:C.red;
  return (
    <div onClick={onClose} style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20 }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:"#0b1020",border:`1px solid ${C.border}`,
        borderRadius:22,padding:26,width:"100%",maxWidth:660,maxHeight:"90vh",overflowY:"auto" }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18 }}>
          <div style={{ display:"flex",gap:14,alignItems:"center" }}>
            <div style={{ fontSize:44 }}>{product.emoji}</div>
            <div>
              <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:26,color:C.text,letterSpacing:1 }}>{product.name}</div>
              <div style={{ fontSize:13,color:C.muted }}>{product.tagline}</div>
            </div>
          </div>
          <button onClick={onClose} style={{ background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer" }}>✕</button>
        </div>
        <div style={{ display:"flex",gap:6,flexWrap:"wrap",marginBottom:16 }}>
          <Pill label={`Inkoop: €${product.buyPrice}`} color={C.muted} />
          <Pill label={`Verkoop: €${product.sellPrice}`} color={C.gold} />
          <Pill label={`Marge: ${product.profitMargin}%`} color={pc} />
          <Pill label={`WOW: ${product.wowScore}/10`} color={C.green} />
          <Pill label={`Trend: ${product.trendScore}/10`} color={C.purple} />
        </div>
        {product.description && <p style={{ fontSize:14,color:"#b8c4d8",lineHeight:1.75,marginBottom:18 }}>{product.description}</p>}
        <Btn full onClick={onToggle} color={C.green} style={{ marginBottom:24 }}>
          {selected?"✓ Verwijder uit selectie":"+ Voeg toe aan selectie"}
        </Btn>
        <div style={{ borderTop:`1px solid ${C.border}`,paddingTop:20 }}>
          <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:17,color:C.text,letterSpacing:1,marginBottom:14 }}>
            GERELATEERDE PRODUCTEN
          </div>
          {loadingRel ? <div style={{ padding:24,display:"flex",justifyContent:"center" }}><Spinner /></div> : (
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
              {related.map((rp,i)=>{
                const rs = selectedProducts?.some(s=>s.name===rp.name);
                return (
                  <div key={i} style={{ background:rs?"rgba(0,230,118,0.05)":C.card,
                    border:`1px solid ${rs?"rgba(0,230,118,0.25)":C.border}`,borderRadius:12,padding:14 }}>
                    <div style={{ fontSize:24,marginBottom:6 }}>{rp.emoji}</div>
                    <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:15,color:C.text,marginBottom:3 }}>{rp.name}</div>
                    <div style={{ fontSize:11,color:C.muted,lineHeight:1.4,marginBottom:8 }}>{rp.tagline}</div>
                    <div style={{ display:"flex",gap:4,flexWrap:"wrap",marginBottom:8 }}>
                      <Pill label={`€${rp.sellPrice}`} color={C.gold} />
                      <Pill label={`${rp.profitMargin}%`} color={rp.profitMargin>=50?C.green:C.gold} />
                    </div>
                    <Btn sm full onClick={()=>onAddRelated(rp)} color={rs?C.green:C.muted}>
                      {rs?"✓ Geselecteerd":"+ Selecteer"}
                    </Btn>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── SVG Logo ──────────────────────────────────────────────────────────────────
const makeLogo = (name, primary, secondary) => {
  const init = name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 90">
    <rect x="2" y="2" width="64" height="64" rx="14" fill="${primary}22" stroke="${primary}66" stroke-width="1.5"/>
    <text x="34" y="47" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="${primary}" text-anchor="middle">${init}</text>
    <text x="80" y="40" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#eef0f5" letter-spacing="1.5">${name.toUpperCase().slice(0,14)}</text>
    <rect x="80" y="48" width="${Math.min(name.length*12,170)}" height="3" rx="1.5" fill="${secondary}"/>
  </svg>`;
};

// ── Home ─────────────────────────────────────────────────────────────────────
const HomeScreen = ({ onStart }) => (
  <div style={{ minHeight:"100vh",display:"flex",flexDirection:"column",
    alignItems:"center",justifyContent:"center",padding:40,textAlign:"center" }}>
    <div style={{ fontSize:58,marginBottom:10 }}>🚀</div>
    <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:72,color:C.text,letterSpacing:5,lineHeight:1,marginBottom:4 }}>
      DROP<span style={{ color:C.green }}>AI</span>
    </div>
    <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:18,color:C.gold,letterSpacing:4,marginBottom:14 }}>
      AI-GEDREVEN DROPSHIPPING PLATFORM
    </div>
    <p style={{ fontSize:15,color:C.muted,maxWidth:480,lineHeight:1.8,marginBottom:38 }}>
      Vind winstgevende producten met een wow-factor, bouw je webshop automatisch met AI, ontvang een logo en slogan, en download dagelijks verse rechtenvrije video's voor TikTok & Instagram.
    </p>
    <div style={{ display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",marginBottom:44 }}>
      {["⚡ AI Producten","💰 Winstanalyse","🏪 Store Builder","🎨 Logo Generator","📱 TikTok Video's"].map(f=>(
        <div key={f} style={{ padding:"9px 16px",borderRadius:20,border:`1px solid ${C.border}`,
          background:C.card,fontSize:12,color:C.muted }}>{f}</div>
      ))}
    </div>
    <Btn onClick={onStart} style={{ fontSize:15,padding:"17px 52px",letterSpacing:1 }}>
      START MET ONTDEKKEN →
    </Btn>
  </div>
);

// ── Discover ──────────────────────────────────────────────────────────────────
const DiscoverScreen = ({ cat, setCat, products, loading, selected, onToggle, onDetail, onGenerate, error }) => (
  <div style={{ padding:"28px 24px 80px" }}>
    <div style={{ marginBottom:24 }}>
      <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:32,color:C.text,letterSpacing:2,marginBottom:3 }}>PRODUCT ONTDEKKING</div>
      <div style={{ fontSize:14,color:C.muted }}>Kies een categorie — AI zoekt de beste producten voor jou</div>
    </div>
    <div style={{ display:"flex",flexWrap:"wrap",gap:8,marginBottom:20 }}>
      {CATS.map(c=>(
        <button key={c.id} onClick={()=>setCat(c.id)} style={{
          padding:"9px 15px",borderRadius:10,fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .15s",
          border:`1px solid ${cat===c.id?C.green+"50":C.border}`,
          background:cat===c.id?`${C.green}18`:C.card,
          color:cat===c.id?C.green:C.muted
        }}>{c.icon} {c.label}</button>
      ))}
    </div>
    <Btn onClick={onGenerate} disabled={!cat||loading} style={{ marginBottom:24 }}>
      {loading?"⏳ AI analyseert markt...":"🔍 Vind Beste Producten"}
    </Btn>
    {error && <div style={{ color:C.red,fontSize:13,marginBottom:14 }}>{error}</div>}
    {loading && <div style={{ display:"flex",justifyContent:"center",padding:60 }}><Spinner size={44} /></div>}
    {!loading && products.length>0 && (
      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:14 }}>
        {products.map((p,i)=>(
          <ProductCard key={i} p={p} selected={selected.some(s=>s.name===p.name)}
            onToggle={()=>onToggle(p)} onDetail={()=>onDetail(p)} />
        ))}
      </div>
    )}
    {!loading && products.length===0 && !error && (
      <div style={{ textAlign:"center",padding:"60px 20px",color:C.muted }}>
        <div style={{ fontSize:40,marginBottom:12 }}>🔍</div>
        <div style={{ fontSize:14 }}>Kies een categorie en klik op "Vind Beste Producten"</div>
      </div>
    )}
  </div>
);

// ── Selection ─────────────────────────────────────────────────────────────────
const SelectionScreen = ({ selected, onRemove, onBuildStore }) => {
  const pct = Math.min((selected.length/5)*100,100);
  const ready = selected.length>=5;
  return (
    <div style={{ padding:"28px 24px 80px" }}>
      <div style={{ marginBottom:24 }}>
        <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:32,color:C.text,letterSpacing:2,marginBottom:3 }}>MIJN PRODUCTENSELECTIE</div>
        <div style={{ fontSize:14,color:C.muted }}>Selecteer minimaal 5 producten om door te gaan</div>
      </div>
      <div style={{ background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:18,marginBottom:24 }}>
        <div style={{ display:"flex",justifyContent:"space-between",marginBottom:10 }}>
          <span style={{ fontSize:13,fontWeight:600,color:C.text }}>{selected.length} / 5+ producten</span>
          <span style={{ fontSize:13,color:ready?C.green:C.gold }}>{ready?"✓ Klaar om te bouwen!":`Nog ${5-selected.length} nodig`}</span>
        </div>
        <div style={{ height:6,background:"rgba(255,255,255,0.07)",borderRadius:3 }}>
          <div style={{ height:"100%",width:`${pct}%`,background:ready?C.green:C.gold,borderRadius:3,transition:"width .5s" }} />
        </div>
      </div>
      {selected.length===0 ? (
        <div style={{ textAlign:"center",padding:"60px 20px",color:C.muted }}>
          <div style={{ fontSize:40,marginBottom:12 }}>🛒</div>
          <div>Geen producten geselecteerd. Ga naar "Ontdekken".</div>
        </div>
      ) : (
        <div style={{ display:"flex",flexDirection:"column",gap:10,marginBottom:24 }}>
          {selected.map((p,i)=>{
            const pc=p.profitMargin>=60?C.green:p.profitMargin>=40?C.gold:C.red;
            return (
              <div key={i} style={{ background:C.card,border:`1px solid ${C.border}`,
                borderRadius:14,padding:"15px 18px",display:"flex",alignItems:"center",gap:14 }}>
                <div style={{ fontSize:28,flexShrink:0 }}>{p.emoji}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:17,color:C.text }}>{p.name}</div>
                  <div style={{ fontSize:12,color:C.muted,marginTop:2 }}>{p.tagline}</div>
                  <div style={{ display:"flex",gap:5,marginTop:6,flexWrap:"wrap" }}>
                    <Pill label={`€${p.sellPrice}`} color={C.gold} />
                    <Pill label={`${p.profitMargin}% marge`} color={pc} />
                    <Pill label={`WOW ${p.wowScore}/10`} color={C.green} />
                  </div>
                </div>
                <button onClick={()=>onRemove(p)} style={{ background:"none",border:`1px solid ${C.red}30`,
                  borderRadius:8,color:C.red,padding:"6px 10px",fontSize:11,cursor:"pointer" }}>✕</button>
              </div>
            );
          })}
        </div>
      )}
      {ready && <Btn full onClick={onBuildStore} color={C.green}>🏪 Bouw Mijn Winkel met AI →</Btn>}
    </div>
  );
};

// ── Store ─────────────────────────────────────────────────────────────────────
const StoreScreen = ({ selected, storeData, loading, onGenerate, onRegenerate, tab, setTab }) => (
  <div style={{ padding:"28px 24px 80px" }}>
    <div style={{ marginBottom:24 }}>
      <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:32,color:C.text,letterSpacing:2,marginBottom:3 }}>WINKEL BOUWEN</div>
      <div style={{ fontSize:14,color:C.muted }}>AI bouwt je complete webshop op basis van je geselecteerde producten</div>
    </div>
    {selected.length<5&&!storeData&&(
      <div style={{ background:`${C.gold}12`,border:`1px solid ${C.gold}35`,borderRadius:14,
        padding:"14px 18px",marginBottom:20,fontSize:13,color:C.gold }}>
        ⚠️ Selecteer minimaal 5 producten in "Mijn Producten" om je winkel te bouwen.
      </div>
    )}
    {!storeData&&selected.length>=5&&<Btn onClick={onGenerate} disabled={loading} style={{ marginBottom:28 }}>
      {loading?"⏳ AI bouwt je winkel...":"🤖 AI Bouwt Mijn Winkel"}
    </Btn>}
    {loading&&<div style={{ display:"flex",flexDirection:"column",alignItems:"center",padding:60,gap:14 }}>
      <Spinner size={48} /><div style={{ fontSize:14,color:C.muted }}>AI analyseert je producten...</div>
    </div>}
    {storeData&&!loading&&(<>
      <div style={{ display:"flex",gap:8,marginBottom:22,flexWrap:"wrap" }}>
        {[["shop","🏪 Winkel"],["brand","🎨 Brand"],["products","📝 Producten"],["faq","❓ FAQ"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:600,cursor:"pointer",
            border:`1px solid ${tab===id?C.green+"50":C.border}`,
            background:tab===id?`${C.green}18`:C.card,color:tab===id?C.green:C.muted
          }}>{label}</button>
        ))}
      </div>

      {tab==="shop"&&(<div style={{ animation:"fadein .3s ease" }}>
        <div style={{ background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24,marginBottom:14 }}>
          <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:44,letterSpacing:2,marginBottom:4,
            color:storeData.colorScheme?.primary||C.green }}>{storeData.storeName||"Jouw Winkel"}</div>
          <div style={{ fontSize:18,color:C.gold,fontWeight:600,marginBottom:14 }}>"{storeData.tagline}"</div>
          <div style={{ fontSize:14,color:"#b8c4d8",lineHeight:1.75,marginBottom:20 }}>{storeData.brandStory}</div>
          <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
            {Object.entries(storeData.colorScheme||{}).map(([k,v])=>(
              <div key={k} style={{ background:v+"25",border:`1px solid ${v}50`,borderRadius:8,
                padding:"7px 14px",fontSize:12,color:v }}>
                {k==="primary"?"Hoofdkleur":"Accentkleur"}: {v}
              </div>
            ))}
          </div>
        </div>
        <Btn onClick={onRegenerate} color={C.muted}>↻ Opnieuw Genereren</Btn>
      </div>)}

      {tab==="brand"&&(<div style={{ animation:"fadein .3s ease" }}>
        <div style={{ background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:26,marginBottom:14 }}>
          <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:16,color:C.muted,letterSpacing:1,marginBottom:14 }}>JOUW LOGO</div>
          <div style={{ background:"#0b1020",border:`1px solid ${C.border}`,borderRadius:12,padding:28,marginBottom:20,
            display:"flex",justifyContent:"center" }}
            dangerouslySetInnerHTML={{ __html:makeLogo(storeData.storeName||"Shop",storeData.colorScheme?.primary||C.green,storeData.colorScheme?.secondary||C.gold) }} />
          <div style={{ textAlign:"center",fontFamily:"Bebas Neue,sans-serif",fontSize:20,color:C.text,letterSpacing:2,marginBottom:6 }}>JOUW SLOGAN</div>
          <div style={{ textAlign:"center",fontSize:20,color:storeData.colorScheme?.primary||C.green,fontWeight:600,fontStyle:"italic" }}>
            "{storeData.tagline}"
          </div>
        </div>
      </div>)}

      {tab==="products"&&(<div style={{ display:"flex",flexDirection:"column",gap:12,animation:"fadein .3s ease" }}>
        {selected.map((p,i)=>(
          <div key={i} style={{ background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20 }}>
            <div style={{ display:"flex",gap:12,alignItems:"center",marginBottom:10 }}>
              <div style={{ fontSize:28 }}>{p.emoji}</div>
              <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:18,color:C.text }}>{p.name}</div>
              <Pill label={`€${p.sellPrice}`} color={C.gold} />
            </div>
            <div style={{ fontSize:13,color:"#b0bdd4",lineHeight:1.75 }}>
              {storeData.productDescriptions?.[p.name]||p.description||p.tagline}
            </div>
          </div>
        ))}
      </div>)}

      {tab==="faq"&&(<div style={{ display:"flex",flexDirection:"column",gap:10,animation:"fadein .3s ease" }}>
        {(storeData.faqs||[]).map((faq,i)=>(
          <div key={i} style={{ background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:18 }}>
            <div style={{ fontWeight:700,color:C.text,fontSize:14,marginBottom:8 }}>Q: {faq.question}</div>
            <div style={{ fontSize:13,color:"#b0bdd4",lineHeight:1.7 }}>A: {faq.answer}</div>
          </div>
        ))}
      </div>)}
    </>)}
  </div>
);

// ── Videos ─────────────────────────────────────────────────────────────────────
const VideosScreen = ({ selected, pexelsKey, setPexelsKey, videos, loading, onFetch, error }) => (
  <div style={{ padding:"28px 24px 80px" }}>
    <div style={{ marginBottom:24 }}>
      <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:32,color:C.text,letterSpacing:2,marginBottom:3 }}>RECHTENVRIJE VIDEO'S</div>
      <div style={{ fontSize:14,color:C.muted }}>Dagelijks verse video's voor TikTok & Instagram — geen copyright strikes</div>
    </div>
    <div style={{ background:`${C.purple}10`,border:`1px solid ${C.purple}30`,borderRadius:14,
      padding:"14px 18px",marginBottom:22,fontSize:13,color:"#c4b5fd",lineHeight:1.6 }}>
      🔑 Maak een gratis account op <a href="https://www.pexels.com/api/" target="_blank" rel="noopener noreferrer"
        style={{ color:C.purple }}>pexels.com/api</a> → kopieer je API sleutel → video's worden elke dag automatisch ververst!
    </div>
    <div style={{ display:"flex",gap:10,marginBottom:24,flexWrap:"wrap" }}>
      <input value={pexelsKey} onChange={e=>setPexelsKey(e.target.value)}
        placeholder="Pexels API Key (bijv. abc123456...)"
        style={{ flex:1,minWidth:240,padding:"11px 16px",borderRadius:12,
          border:`1px solid ${C.border}`,background:C.card,color:C.text,fontSize:13,outline:"none" }} />
      <Btn onClick={onFetch} disabled={!pexelsKey.trim()||loading}>
        {loading?"⏳ Laden...":"🔄 Haal Video's Op"}
      </Btn>
    </div>
    {error&&<div style={{ color:C.red,fontSize:13,marginBottom:14 }}>{error}</div>}
    {loading&&<div style={{ display:"flex",justifyContent:"center",padding:60 }}><Spinner size={44} color={C.purple} /></div>}
    {!loading&&videos.length>0&&(
      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12 }}>
        {videos.map((v,i)=>{
          const file=v.video_files?.find(f=>f.quality==="sd"||f.width<=640)||v.video_files?.[0];
          return (
            <div key={i} style={{ background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden" }}>
              <div style={{ position:"relative",paddingTop:"177%" }}>
                <video src={file?.link} style={{ position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover" }}
                  muted loop preload="metadata"
                  onMouseEnter={e=>e.currentTarget.play()} onMouseLeave={e=>e.currentTarget.pause()} />
                <div style={{ position:"absolute",bottom:0,left:0,right:0,
                  background:"linear-gradient(transparent,rgba(0,0,0,.8))",
                  padding:"12px 10px 8px",fontSize:10,color:"#fff" }}>▶ Hover = afspelen</div>
              </div>
              <div style={{ padding:"12px 14px" }}>
                <div style={{ fontSize:10,color:C.muted,marginBottom:8 }}>
                  {v.width}×{v.height} · {v.duration}s · {v.user?.name}
                </div>
                {file?.link&&(
                  <a href={file.link} download target="_blank" rel="noopener noreferrer" style={{ textDecoration:"none" }}>
                    <Btn sm full color={C.purple}>⬇ Download Video</Btn>
                  </a>
                )}
              </div>
            </div>
          );
        })}
      </div>
    )}
    {!loading&&videos.length===0&&!error&&(
      <div style={{ textAlign:"center",padding:"60px 20px",color:C.muted }}>
        <div style={{ fontSize:40,marginBottom:12 }}>📱</div>
        <div style={{ fontSize:14 }}>Vul je Pexels API sleutel in en klik op "Haal Video's Op"</div>
        <div style={{ fontSize:12,marginTop:8 }}>Video's worden dagelijks ververst op basis van je producten</div>
      </div>
    )}
  </div>
);

// ── Sidebar ────────────────────────────────────────────────────────────────────
const Sidebar = ({ screen, setScreen, selected }) => (
  <div style={{ width:210,flexShrink:0,background:C.sidebar,
    borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",minHeight:"100vh" }}>
    <div style={{ padding:"20px 16px 16px",borderBottom:`1px solid ${C.border}` }}>
      <div style={{ fontFamily:"Bebas Neue,sans-serif",fontSize:24,letterSpacing:3 }}>
        DROP<span style={{ color:C.green }}>AI</span>
      </div>
      <div style={{ fontSize:10,color:C.muted,marginTop:2,letterSpacing:1 }}>AI DROPSHIPPING TOOL</div>
    </div>
    <div style={{ flex:1,padding:"10px 0" }}>
      {NAV.map(item=>(
        <div key={item.id} onClick={()=>setScreen(item.id)} style={{
          display:"flex",alignItems:"center",gap:10,padding:"11px 16px",cursor:"pointer",
          background:screen===item.id?"rgba(0,230,118,0.08)":"transparent",
          borderLeft:screen===item.id?`3px solid ${C.green}`:"3px solid transparent",
          color:screen===item.id?C.green:C.muted,
          fontSize:13,fontWeight:600,transition:"all .15s"
        }}>
          <span style={{ fontSize:16 }}>{item.icon}</span>
          <span>{item.label}</span>
          {item.id==="selection"&&selected.length>0&&(
            <span style={{ marginLeft:"auto",background:selected.length>=5?C.green:C.gold,
              color:"#000",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:800 }}>{selected.length}</span>
          )}
        </div>
      ))}
    </div>
    <div onClick={()=>setScreen("home")} style={{ padding:"12px 16px",fontSize:12,color:C.muted,
      cursor:"pointer",borderTop:`1px solid ${C.border}` }}>← Home</div>
  </div>
);

// ── App ───────────────────────────────────────────────────────────────────────
function DropAI() {
  const [screen, setScreen] = useState("home");
  const [cat, setCat] = useState(null);
  const [products, setProducts] = useState([]);
  const [loadingProducts, setLoadingProducts] = useState(false);
  const [selected, setSelected] = useState([]);
  const [modal, setModal] = useState(null);
  const [related, setRelated] = useState([]);
  const [loadingRel, setLoadingRel] = useState(false);
  const [storeData, setStoreData] = useState(null);
  const [loadingStore, setLoadingStore] = useState(false);
  const [storeTab, setStoreTab] = useState("shop");
  const [pexelsKey, setPexelsKey] = useState(localStorage.getItem("dropai_pkey")||"");
  const [videos, setVideos] = useState([]);
  const [loadingVideos, setLoadingVideos] = useState(false);
  const [error, setError] = useState("");

  const toggleSelect = useCallback((p) => {
    setSelected(prev=>prev.some(s=>s.name===p.name)?prev.filter(s=>s.name!==p.name):[...prev,p]);
  },[]);

  const generateProducts = async () => {
    if(!cat)return;
    setLoadingProducts(true);setProducts([]);setError("");
    try{
      const catLabel=CATS.find(c=>c.id===cat)?.label||cat;
      const data=await callClaude(`Generate 6 trending dropshipping products in the "${catLabel}" category with high wow factor for the Dutch/European market. Return JSON array with: name (English), emoji (1 emoji), tagline (Dutch, max 12 words), description (Dutch, 2 sentences), buyPrice (EUR number, AliExpress realistic), sellPrice (EUR number, retail), profitMargin (integer 0-80), wowScore (1-10 integer), trendScore (1-10 integer), keywords (3 English Pexels search terms array).`);
      setProducts(Array.isArray(data)?data:data.products||[]);
    }catch(e){setError("Fout bij genereren. Controleer je verbinding.");}
    setLoadingProducts(false);
  };

  const openModal = async (p) => {
    setModal(p);setRelated([]);setLoadingRel(true);
    try{
      const data=await callClaude(`Generate 4 dropshipping products related to "${p.name}". JSON array: name, emoji, tagline (Dutch max 10 words), buyPrice (EUR), sellPrice (EUR), profitMargin (integer), wowScore (1-10), trendScore (1-10).`);
      setRelated(Array.isArray(data)?data:[]);
    }catch(e){}
    setLoadingRel(false);
  };

  const generateStore = async () => {
    if(selected.length<5)return;
    setLoadingStore(true);setStoreData(null);setError("");setStoreTab("shop");
    try{
      const names=selected.map(p=>p.name).join(", ");
      const data=await callClaude(`Create a complete Dutch dropshipping webshop for products: ${names}. Return JSON: storeName (catchy 1-2 word English name), tagline (Dutch max 8 words), brandStory (Dutch 2 sentences), colorScheme ({primary: hex, secondary: hex} — bold matching colors), productDescriptions (object mapping each product name to Dutch 2-sentence sales description), faqs (array of 3 {question, answer} in Dutch).`);
      setStoreData(data);setScreen("store");
    }catch(e){setError("Store generatie mislukt. Probeer opnieuw.");}
    setLoadingStore(false);
  };

  const fetchVideos = async () => {
    if(!pexelsKey.trim())return;
    localStorage.setItem("dropai_pkey",pexelsKey.trim());
    setLoadingVideos(true);setVideos([]);setError("");
    try{
      const today=new Date().toDateString();
      const cache=localStorage.getItem("dropai_vcache");
      if(cache){
        const parsed=JSON.parse(cache);
        if(parsed.date===today&&parsed.key===pexelsKey.trim()){
          setVideos(parsed.videos);setLoadingVideos(false);return;
        }
      }
      const kws=selected.flatMap(p=>p.keywords||[p.name]).filter(Boolean).slice(0,4);
      const use=kws.length>0?kws:["product lifestyle","modern shopping","trendy gadgets"];
      const all=[];
      for(const kw of use){
        const vids=await pexelsSearch(kw,pexelsKey.trim(),3);
        all.push(...vids);
      }
      const unique=all.filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i).slice(0,18);
      setVideos(unique);
      localStorage.setItem("dropai_vcache",JSON.stringify({date:today,key:pexelsKey.trim(),videos:unique}));
    }catch(e){setError("Pexels API fout. Controleer je API sleutel.");}
    setLoadingVideos(false);
  };

  const isHome = screen==="home";

  return (
    <div style={{ minHeight:"100vh",background:C.bg,display:"flex",fontFamily:"DM Sans,sans-serif",color:C.text }}>
      <style>{`@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}`}</style>
      {!isHome&&<Sidebar screen={screen} setScreen={setScreen} selected={selected} />}
      <div style={{ flex:1,overflowY:"auto",height:"100vh" }}>
        {screen==="home"&&<HomeScreen onStart={()=>setScreen("discover")} />}
        {screen==="discover"&&<DiscoverScreen cat={cat} setCat={setCat} products={products}
          loading={loadingProducts} selected={selected} onToggle={toggleSelect}
          onDetail={openModal} onGenerate={generateProducts} error={error} />}
        {screen==="selection"&&<SelectionScreen selected={selected}
          onRemove={p=>setSelected(prev=>prev.filter(s=>s.name!==p.name))}
          onBuildStore={()=>{setScreen("store");generateStore();}} />}
        {screen==="store"&&<StoreScreen selected={selected} storeData={storeData}
          loading={loadingStore} tab={storeTab} setTab={setStoreTab}
          onGenerate={()=>{setScreen("store");generateStore();}} onRegenerate={generateStore} />}
        {screen==="videos"&&<VideosScreen selected={selected} pexelsKey={pexelsKey}
          setPexelsKey={setPexelsKey} videos={videos} loading={loadingVideos}
          onFetch={fetchVideos} error={error} />}
      </div>
      {modal&&<ProductModal product={modal} related={related} loadingRel={loadingRel}
        selected={selected.some(s=>s.name===modal.name)} selectedProducts={selected}
        onToggle={()=>toggleSelect(modal)} onAddRelated={p=>toggleSelect(p)}
        onClose={()=>setModal(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DropAI />);
document.getElementById('boot').style.display='none';
</script>
</body>
</html>
