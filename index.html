// Smart API caller — proxy on Vercel, direct key fallback for local/preview
const callAI=async(prompt)=>{
  // Always try the proxy first — works silently on Vercel with env key set
  try{
    const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),20000);
    const r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt}),signal:ctrl.signal});
    clearTimeout(tid);
    if(r.ok){const d=await r.json();if(d.result){return JSON.parse(d.result);}if(d.error&&!d.error.includes('not configured'))throw new Error(d.error);}
  }catch(e){
    // Only continue to fallback if proxy simply not available (AbortError, NetworkError, 404)
    const isProxyMissing=e.name==='AbortError'||e.message.includes('fetch')||e.message.includes('Failed')||e.message.includes('NetworkError')||e.message.includes('not configured');
    if(!isProxyMissing)throw e;
  }
  // Fallback: direct API call using stored key (local/preview mode)
  const key=LS.get("dai_apikey","");
  if(!key)throw new Error("NO_KEY");
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:4000,system:'Return valid JSON only. No markdown, no backticks.',messages:[{role:'user',content:prompt}]})});

  const raw=(d.content?.[0]?.text||'[]').replace(/```json\n?|```/g,'').trim();return JSON.parse(raw);
};

  const loadMore=async()=>{if(!cat||loadP)return;setLoadP(true);setErr("");try{const ex=prods.map(p=>p.name).join(", ");const lbl=CATS.find(c=>c.id===cat)?.label||cat;const data=await callAI(`Generate 10 MORE unique products for "${lbl}" niche. DO NOT use: ${ex}. JSON array 10: name (English),emoji,tagline (English max 10w),description (2 sentences),buyPrice (EUR),sellPrice (EUR min €10 profit),profitMargin (integer),wowScore (1-10),trendScore (1-10),keywords (3 terms),upsellTip,colors (3 objects {name,hex}).`);const more=Array.isArray(data)?data:data.products||[];setProds(prev=>[...prev,...more.filter(p=>p&&p.name)]);}catch(e){handleErr(e,"Failed: ");}setLoadP(false);};
  const openModal=async p=>{setModal(p);setRelated([]);setLoadR(true);try{const data=await callAI(`I sell "${p.name}" (${p.tagline}). Generate 6 bundle/upsell products. JSON array 6: name,emoji,tagline (English max 8 words),buyPrice (EUR),sellPrice (EUR),profitMargin (integer),wowScore (1-10),trendScore (1-10),bundleReason (2-3 word label),whyPairs (1 English sentence).`);setRelated(Array.isArray(data)?data:[]);}catch{}setLoadR(false);};
  const genStore=async()=>{if(sel.length<5)return;setLoadS(true);setStoreData(null);setErr("");setStoreTab("shop");try{const names=sel.map(p=>p.name).join(", ");const data=await callAI(`Create an English dropshipping store for: ${names}. JSON: storeName (1-2 word brand), tagline (English max 8 words), brandStory (2-3 English sentences), colorScheme ({primary: hex, secondary: hex}), productDescriptions (object: each product name → English 2-sentence description), faqs (array 4 objects {question, answer} English).`);setStoreData(data);setScreen("store");}catch(e){handleErr(e,"Store failed: ");}setLoadS(false);};
  const fetchVideos=async()=>{if(!pxKey.trim()||sel.length===0)return;LS.set("dai_pkey",pxKey.trim());setLoadV(true);setVideos([]);setErr("");const all=[];const kws=new Set();sel.forEach(p=>{(p.keywords||[]).forEach(k=>kws.add(k));p.name.split(" ").slice(0,2).forEach(w=>kws.add(w));});const catKws=CATS.find(c=>sel.length>0);if(catKws)(catKws.kws||[]).forEach(k=>kws.add(k));const queries=[...kws].slice(0,6);const fallbacks=["lifestyle product","trending item","online shopping","modern gadget","tiktok viral","unboxing"];const toTry=queries.length>=2?queries:[...queries,...fallbacks].slice(0,5);for(const q of toTry){try{const v=await callPexels(q,pxKey.trim(),4);all.push(...v);}catch{}}if(all.length<4){for(const q of fallbacks){try{const v=await callPexels(q,pxKey.trim(),4);all.push(...v);}catch{}if(all.length>=12)break;}}const uniq=all.filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i).slice(0,20);if(!uniq.length){setErr("No videos found. Check your Pexels API key at pexels.com/api");setLoadV(false);return;}setVideos(uniq);toast({m:`Loaded ${uniq.length} videos!`,i:"📱",c:C.purple});setLoadV(false);};

  if(!user)return h(Auth,{onLogin:login});
  if(needKey&&!isVercel)return h(ApiSetup,{onDone:()=>setNeedKey(false)});

  return h("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",color:C.text}},
    h(Toast,{ts:toasts}),
    screen!=="home"&&h(Sidebar,{screen,setScreen,sel,user,onLogout:logout,onSettings:()=>setNeedKey(true)}),
    h("div",{className:"sa",style:{flex:1}},
      screen==="home"&&h(Home,{onStart:()=>setScreen("discover"),user}),
      screen==="dashboard"&&user?.role==="admin"&&h(Dashboard,{addToast:toast}),
      screen==="discover"&&h(Discover,{cat,setCat,prods,loading:loadP,sel,onToggle:togSel,onDetail:openModal,onGen:genProds,onMore:loadMore,err}),
      screen==="selection"&&h(Selection,{sel,onRemove:p=>setSel(prev=>prev.filter(s=>s.name!==p.name)),onBuild:()=>{setScreen("store");genStore();}}),
      screen==="store"&&h(Store,{sel,storeData,loading:loadS,tab:storeTab,setTab:setStoreTab,onGenerate:()=>{setScreen("store");genStore();},onRegen:genStore,addToast:toast}),
      screen==="videos"&&h(Videos,{sel,pxKey,setPxKey:savePxKey,videos,loading:loadV,onFetch:fetchVideos,err})),
    modal&&h(PModal,{p:modal,related,loadRel:loadR,sel:sel.some(s=>s.name===modal.name),selAll:sel,onToggle:()=>togSel(modal),onAddRel:p=>togSel(p),onClose:()=>setModal(null)}));}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script></body></html>
