<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DropAI — AI Dropshipping Platform</title>
  <meta name="description" content="AI-powered dropshipping platform. Find winning products, build your store, get viral videos.">
  <meta name="theme-color" content="#070b14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;background:#070b14;font-family:'DM Sans',sans-serif}
    body{overflow:hidden}
    #boot{position:fixed;inset:0;background:#070b14;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
    .bspin{width:44px;height:44px;border-radius:50%;border:3px solid rgba(0,230,118,.15);border-top:3px solid #00e676;animation:bsp .8s linear infinite;margin-top:16px}
    @keyframes bsp{to{transform:rotate(360deg)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
    input,button,textarea,select{font-family:'DM Sans',sans-serif}
    input::placeholder,textarea::placeholder{color:#7a8ba5}
    button{cursor:pointer;border:none;background:none}
    a{text-decoration:none}
    input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#00e676;cursor:pointer}
  </style>
</head>
<body>
<div id="boot">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:4px;color:#eef0f5">DROP<span style="color:#00e676">AI</span></div>
  <div style="font-size:12px;color:#7a8ba5;letter-spacing:3px;margin-top:6px">LOADING...</div>
  <div class="bspin"></div>
</div>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState,useCallback,useEffect,useRef,useMemo}=React;

// ── COLORS ────────────────────────────────────────────────────────────────────
const C={
  bg:"#070b14",card:"rgba(255,255,255,0.045)",cardH:"rgba(255,255,255,0.08)",
  border:"rgba(255,255,255,0.09)",borderH:"rgba(255,255,255,0.22)",
  green:"#00e676",gold:"#FFB800",red:"#ff5252",purple:"#a78bfa",blue:"#38bdf8",
  text:"#eef0f5",muted:"#7a8ba5",sidebar:"#080c17",dark:"#0b1020",
};

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const ADMIN_EMAIL="admin@dropai.com";
const ADMIN_PASS="DropAI2025!";
const CATS=[
  {id:"tech",label:"Tech Gadgets",icon:"⚡",kws:["tech gadget","smart device","electronics"]},
  {id:"beauty",label:"Beauty & Skin",icon:"✨",kws:["skincare","beauty product","cosmetics"]},
  {id:"home",label:"Home & Living",icon:"🏠",kws:["home decor","interior","household"]},
  {id:"fitness",label:"Fitness",icon:"💪",kws:["fitness equipment","workout","exercise"]},
  {id:"pets",label:"Pet Products",icon:"🐾",kws:["pet accessory","dog cat toy","pet care"]},
  {id:"outdoor",label:"Outdoor",icon:"🌿",kws:["outdoor adventure","camping","nature"]},
  {id:"fashion",label:"Fashion",icon:"👗",kws:["fashion clothing","accessories","style"]},
  {id:"kids",label:"Kids & Baby",icon:"🧸",kws:["kids toy","baby product","children"]},
];

// ── LOCAL STORAGE / DB ────────────────────────────────────────────────────────
const LS={
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};
const DB={
  users:()=>LS.get("dai_users",{}),
  user:(e)=>DB.users()[e]||null,
  save:(e,d)=>{const u=DB.users();u[e]={...u[e],...d};LS.set("dai_users",u);},
  orders:()=>LS.get("dai_orders",[]),
  addOrder:(o)=>{const a=DB.orders();a.push({...o,id:Date.now(),date:new Date().toISOString()});LS.set("dai_orders",a);},
  stats:()=>{const o=DB.orders();return{revenue:o.reduce((s,x)=>s+(x.total||0),0),orders:o.length,users:Object.keys(DB.users()).length,list:o};},
};

// ── API ───────────────────────────────────────────────────────────────────────
const API=async(prompt,sys="Return valid JSON only. No markdown, no backticks.")=>{
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:4000,system:sys,
      messages:[{role:"user",content:prompt}]}),
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  const raw=d.content?.[0]?.text||"{}";
  return JSON.parse(raw.replace(/```json\n?|```/g,"").trim());
};

const PEXELS=async(query,key,n=4)=>{
  const r=await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&per_page=${n}&orientation=portrait`,
    {headers:{Authorization:key}});
  if(!r.ok)throw new Error(`Pexels API ${r.status}`);
  const d=await r.json();
  return d.videos||[];
};

const PUSH=(title,body)=>{
  if(!("Notification"in window))return;
  const s=()=>new Notification(title,{body,icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%23070b14' rx='12'/><text x='32' y='44' font-size='32' text-anchor='middle' fill='%2300e676' font-family='Arial Black'>D</text></svg>"});
  Notification.permission==="granted"?s():Notification.requestPermission().then(p=>p==="granted"&&s());
};

// ── MINI UI ───────────────────────────────────────────────────────────────────
const Pill=({label,color})=>(
  <span style={{padding:"3px 9px",borderRadius:6,fontSize:10,fontWeight:700,whiteSpace:"nowrap",
    background:color+"1a",color,border:`1px solid ${color}30`}}>{label}</span>
);
const Bar=({label,val,color})=>(
  <div style={{flex:1}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
      <span style={{fontSize:9,color:C.muted,fontWeight:700}}>{label}</span>
      <span style={{fontSize:9,color,fontWeight:800}}>{val}/10</span>
    </div>
    <div style={{height:3,background:"rgba(255,255,255,0.07)",borderRadius:2}}>
      <div style={{height:"100%",width:`${val*10}%`,background:color,borderRadius:2,transition:"width .5s"}}/>
    </div>
  </div>
);
const Spin=({size=32,color=C.green})=>(
  <div style={{width:size,height:size,borderRadius:"50%",
    border:`2.5px solid ${color}20`,borderTop:`2.5px solid ${color}`,
    animation:"spin .8s linear infinite",margin:"0 auto"}}/>
);
const Btn=({children,onClick,color=C.green,full,sm,disabled,style:sx})=>{
  const [h,setH]=useState(false);
  return <button onClick={onClick} disabled={disabled}
    onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{width:full?"100%":undefined,padding:sm?"7px 14px":"11px 22px",
      borderRadius:sm?8:12,border:`1px solid ${color}40`,
      background:h&&!disabled?`${color}28`:`${color}16`,
      color:disabled?C.muted:color,fontSize:sm?11:13,fontWeight:700,
      cursor:disabled?"not-allowed":"pointer",opacity:disabled?.5:1,
      transition:"all .15s",...sx}}>{children}</button>;
};
const Inp=({value,onChange,placeholder,type="text",style:sx})=>(
  <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} type={type}
    style={{padding:"11px 16px",borderRadius:12,border:`1px solid ${C.border}`,
      background:"rgba(255,255,255,0.05)",color:C.text,fontSize:13,outline:"none",
      width:"100%",...sx}}/>
);

const Toast=({toasts})=>(
  <div style={{position:"fixed",top:16,right:16,zIndex:99999,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>
    {toasts.map(t=>(
      <div key={t.id} style={{background:"#0e1525",border:`1px solid ${(t.color||C.green)}35`,borderRadius:12,
        padding:"12px 18px",fontSize:13,color:C.text,minWidth:260,maxWidth:340,animation:"slideIn .3s ease",
        boxShadow:"0 8px 32px rgba(0,0,0,.5)"}}>
        <span style={{marginRight:8}}>{t.icon||"🔔"}</span>{t.msg}
      </div>
    ))}
  </div>
);

// ── AUTH ──────────────────────────────────────────────────────────────────────
const Auth=({onLogin})=>{
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [name,setName]=useState("");
  const [code,setCode]=useState("");
  const [sent,setSent]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const doLogin=()=>{
    setErr("");
    if(email===ADMIN_EMAIL&&pass===ADMIN_PASS){onLogin({email,name:"Owner",role:"admin"});return;}
    const u=DB.user(email);
    if(!u){setErr("No account found with this email.");return;}
    if(u.password!==pass){setErr("Incorrect password.");return;}
    if(!u.verified){setErr("Please verify your email first.");return;}
    onLogin({email,name:u.name,role:"user"});
  };
  const doReg=()=>{
    setErr("");
    if(!name||!email||!pass){setErr("Please fill in all fields.");return;}
    if(pass.length<6){setErr("Password must be at least 6 characters.");return;}
    if(DB.user(email)){setErr("Email already in use.");return;}
    setLoading(true);
    const c=Math.floor(100000+Math.random()*900000).toString();
    setSent(c);
    DB.save(email,{name,password:pass,verified:false,code:c});
    setTimeout(()=>{setLoading(false);setMode("verify");},600);
  };
  const doVerify=()=>{
    if(code!==sent){setErr("Incorrect code. Try again.");return;}
    DB.save(email,{verified:true});
    onLogin({email,name:DB.user(email).name,role:"user"});
  };

  const field=(val,set,ph,type="text")=>(
    <input value={val} onChange={e=>set(e.target.value)} placeholder={ph} type={type}
      onKeyDown={e=>e.key==="Enter"&&mode==="login"&&doLogin()}
      style={{width:"100%",padding:"12px 16px",borderRadius:12,border:`1px solid ${C.border}`,
        background:"rgba(255,255,255,0.05)",color:C.text,fontSize:14,outline:"none"}}/>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:420,animation:"fadeUp .4s ease"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:58,letterSpacing:4,color:C.text,lineHeight:1}}>
            DROP<span style={{color:C.green}}>AI</span></div>
          <div style={{fontSize:11,color:C.muted,letterSpacing:3,marginTop:6}}>AI DROPSHIPPING PLATFORM</div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:32}}>
          {mode==="login"&&<>
            <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:22,color:C.text,letterSpacing:2,marginBottom:20}}>SIGN IN</div>
            <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
              {field(email,setEmail,"Email address","email")}
              {field(pass,setPass,"Password","password")}
            </div>
            {err&&<div style={{color:C.red,fontSize:12,marginBottom:12,padding:"8px 12px",background:`${C.red}10`,borderRadius:8}}>{err}</div>}
            <Btn full onClick={doLogin} style={{marginBottom:16,fontSize:14,padding:"13px"}}>Sign In →</Btn>
            <div style={{textAlign:"center",fontSize:13,color:C.muted}}>
              No account? <span onClick={()=>{setMode("register");setErr("");}} style={{color:C.green,cursor:"pointer",fontWeight:700}}>Create one</span>
            </div>
            <div style={{marginTop:16,padding:"10px 14px",background:`${C.gold}0d`,border:`1px solid ${C.gold}25`,borderRadius:10,fontSize:11,color:C.gold}}>
              👑 Admin login: {ADMIN_EMAIL} / {ADMIN_PASS}
            </div>
          </>}
          {mode==="register"&&<>
            <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:22,color:C.text,letterSpacing:2,marginBottom:20}}>CREATE ACCOUNT</div>
            <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
              {field(name,setName,"Full name")}
              {field(email,setEmail,"Email address","email")}
              {field(pass,setPass,"Password (min. 6 chars)","password")}
            </div>
            {err&&<div style={{color:C.red,fontSize:12,marginBottom:12,padding:"8px 12px",background:`${C.red}10`,borderRadius:8}}>{err}</div>}
            <Btn full onClick={doReg} disabled={loading} style={{marginBottom:16,fontSize:14,padding:"13px"}}>
              {loading?"⏳ Creating...":"Create Account →"}</Btn>
            <div style={{textAlign:"center",fontSize:13,color:C.muted}}>
              Already have an account? <span onClick={()=>{setMode("login");setErr("");}} style={{color:C.green,cursor:"pointer",fontWeight:700}}>Sign in</span>
            </div>
          </>}
          {mode==="verify"&&<>
            <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:22,color:C.text,letterSpacing:2,marginBottom:10}}>VERIFY EMAIL</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:20,lineHeight:1.7}}>
              Code sent to <strong style={{color:C.text}}>{email}</strong><br/>
              <span style={{color:C.gold,fontSize:12}}>📧 Demo code: <strong>{sent}</strong></span>
            </div>
            <input value={code} onChange={e=>setCode(e.target.value)} placeholder="6-digit code" maxLength={6}
              style={{width:"100%",padding:"14px 16px",borderRadius:12,border:`1px solid ${C.border}`,
                background:"rgba(255,255,255,0.05)",color:C.text,fontSize:22,letterSpacing:10,
                textAlign:"center",outline:"none",marginBottom:12}}/>
            {err&&<div style={{color:C.red,fontSize:12,marginBottom:12}}>{err}</div>}
            <Btn full onClick={doVerify} style={{marginBottom:12,fontSize:14,padding:"13px"}}>Verify →</Btn>
            <div style={{textAlign:"center"}}><span onClick={()=>setMode("register")} style={{fontSize:12,color:C.muted,cursor:"pointer"}}>← Back</span></div>
          </>}
        </div>
      </div>
    </div>
  );
};

// ── ADMIN DASHBOARD ───────────────────────────────────────────────────────────
const Dashboard=({addToast})=>{
  const stats=DB.stats();
  const [payout,setPayout]=useState(LS.get("dai_payout",""));
  const [saved,setSaved]=useState(false);
  const [amt,setAmt]=useState("");
  const [bal,setBal]=useState(LS.get("dai_bal",0));

  const savePay=()=>{LS.set("dai_payout",payout);setSaved(true);setTimeout(()=>setSaved(false),2000);addToast({msg:"Payment account saved!",icon:"💳",color:C.green});};
  const cashout=()=>{
    const a=parseFloat(amt)||0;
    if(a<=0||a>bal){addToast({msg:"Invalid amount.",icon:"❌",color:C.red});return;}
    const nb=bal-a;setBal(nb);LS.set("dai_bal",nb);
    addToast({msg:`€${a.toFixed(2)} sent to ${payout||"your account"}!`,icon:"💸",color:C.gold});
    PUSH("DropAI – Payout!",`€${a.toFixed(2)} is on its way to your account.`);
    setAmt("");
  };

  const SC=({icon,label,val,color=C.green})=>(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20,flex:1,minWidth:140}}>
      <div style={{fontSize:20,marginBottom:6}}>{icon}</div>
      <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:30,color,letterSpacing:1}}>{val}</div>
      <div style={{fontSize:11,color:C.muted,marginTop:2}}>{label}</div>
    </div>
  );

  return(
    <div style={{padding:"28px 24px 80px",animation:"fadeUp .3s ease"}}>
      <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:32,color:C.text,letterSpacing:2,marginBottom:4}}>ADMIN DASHBOARD</div>
      <div style={{fontSize:14,color:C.muted,marginBottom:24}}>Welcome back, Owner 👑 — Platform overview</div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:22}}>
        <SC icon="💰" label="Total Revenue" val={`€${(stats.revenue+bal).toFixed(2)}`} color={C.gold}/>
        <SC icon="📦" label="Total Orders" val={stats.orders}/>
        <SC icon="👤" label="Registered Users" val={stats.users} color={C.purple}/>
        <SC icon="💳" label="Available Balance" val={`€${bal.toFixed(2)}`}/>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24,marginBottom:16}}>
        <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:18,color:C.text,letterSpacing:1,marginBottom:10}}>💳 PAYMENT ACCOUNT</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:14}}>Add your IBAN or PayPal — withdraw anytime, no waiting!</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <input value={payout} onChange={e=>setPayout(e.target.value)} placeholder="IBAN or PayPal email"
            style={{flex:1,minWidth:220,padding:"11px 16px",borderRadius:12,border:`1px solid ${C.border}`,
              background:"rgba(255,255,255,0.05)",color:C.text,fontSize:13,outline:"none"}}/>
          <Btn onClick={savePay} color={saved?C.gold:C.green}>{saved?"✓ Saved":"Save"}</Btn>
        </div>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.gold}30`,borderRadius:16,padding:24,marginBottom:16}}>
        <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:18,color:C.gold,letterSpacing:1,marginBottom:8}}>💸 WITHDRAW BALANCE</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:14}}>Balance: <strong style={{color:C.gold}}>€{bal.toFixed(2)}</strong> — Instant transfer!</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <input value={amt} onChange={e=>setAmt(e.target.value)} type="number" placeholder="Amount (€)"
            style={{flex:1,minWidth:140,padding:"11px 16px",borderRadius:12,border:`1px solid ${C.border}`,
              background:"rgba(255,255,255,0.05)",color:C.text,fontSize:13,outline:"none"}}/>
          <Btn onClick={cashout} color={C.gold} disabled={!payout}>💸 Withdraw</Btn>
        </div>
        {!payout&&<div style={{fontSize:12,color:C.red,marginTop:8}}>Set your payment account first.</div>}
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24}}>
        <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:18,color:C.text,letterSpacing:1,marginBottom:14}}>📦 RECENT ORDERS</div>
        {stats.list.length===0
          ?<div style={{color:C.muted,fontSize:13}}>No orders yet. Share your store to get sales!</div>
          :[...stats.list].reverse().slice(0,10).map((o,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"10px 14px",background:"rgba(255,255,255,0.02)",borderRadius:10,marginBottom:8,border:`1px solid ${C.border}`}}>
              <div>
                <div style={{fontSize:13,color:C.text,fontWeight:600}}>Order #{String(o.id).slice(-6)}</div>
                <div style={{fontSize:11,color:C.muted}}>{new Date(o.date).toLocaleDateString("en-GB")} · {o.items} product(s)</div>
              </div>
              <Pill label={`€${o.total.toFixed(2)}`} color={C.gold}/>
            </div>
          ))
        }
      </div>
    </div>
  );
};

// ── PRODUCT CARD ──────────────────────────────────────────────────────────────
const PCard=({p,selected,onToggle,onDetail})=>{
  const [h,setH]=useState(false);
  const pc=p.profitMargin>=60?C.green:p.profitMargin>=40?C.gold:C.red;
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} onClick={onDetail}
      style={{background:selected?"rgba(0,230,118,0.07)":h?C.cardH:C.card,
        border:`1px solid ${selected?"rgba(0,230,118,0.4)":h?C.borderH:C.border}`,
        borderRadius:16,padding:18,cursor:"pointer",transition:"all .18s",
        position:"relative",display:"flex",flexDirection:"column",gap:9,animation:"fadeUp .3s ease"}}>
      {selected&&<div style={{position:"absolute",top:10,right:10,background:C.green,
        borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",
        justifyContent:"center",fontSize:11,color:"#000",fontWeight:900}}>✓</div>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{fontSize:30}}>{p.emoji}</div>
        <div style={{display:"flex",flexDirection:"column",gap:3,alignItems:"flex-end"}}>
          <Pill label={`${p.wowScore}/10 WOW`} color={C.green}/>
          <Pill label={`${p.trendScore}/10 TREND`} color={C.gold}/>
        </div>
      </div>
      <div>
        <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:18,color:C.text,letterSpacing:.8}}>{p.name}</div>
        <div style={{fontSize:11,color:C.muted,lineHeight:1.5,marginTop:2}}>{p.tagline}</div>
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        <Pill label={`Buy €${p.buyPrice}`} color={C.muted}/>
        <Pill label={`Sell €${p.sellPrice}`} color={C.gold}/>
        <Pill label={`${p.profitMargin}% margin`} color={pc}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <Bar label="WOW" val={p.wowScore} color={C.green}/>
        <Bar label="TREND" val={p.trendScore} color={C.gold}/>
      </div>
      <div style={{display:"flex",gap:8,marginTop:2}}>

// ── DISCOVER SCREEN ───────────────────────────────────────────────────────────
const Discover=({cat,setCat,products,loading,selected,onToggle,onDetail,onGenerate,onMore,error})=>{
  const [minWow,setMinWow]=useState(0);
  const [minProfit,setMinProfit]=useState(0);
  const [minMargin,setMinMargin]=useState(0);
  const [sortBy,setSortBy]=useState("wow");
  const [showFilters,setShowFilters]=useState(false);

  const filtered=useMemo(()=>{
    let r=[...products];
    if(minWow>0)r=r.filter(p=>p.wowScore>=minWow);
    if(minProfit>0)r=r.filter(p=>(p.sellPrice-p.buyPrice)>=minProfit);
    if(minMargin>0)r=r.filter(p=>p.profitMargin>=minMargin);
    r.sort((a,b)=>{
      if(sortBy==="wow")return b.wowScore-a.wowScore;
      if(sortBy==="trend")return b.trendScore-a.trendScore;
      if(sortBy==="margin")return b.profitMargin-a.profitMargin;
      if(sortBy==="profit")return (b.sellPrice-b.buyPrice)-(a.sellPrice-a.buyPrice);
      return 0;
    });
    return r;
  },[products,minWow,minProfit,minMargin,sortBy]);

  const activeFilters=(minWow>0?1:0)+(minProfit>0?1:0)+(minMargin>0?1:0);

  return(
    <div style={{padding:"28px 24px 80px"}}>
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:32,color:C.text,letterSpacing:2,marginBottom:3}}>PRODUCT DISCOVERY</div>
        <div style={{fontSize:14,color:C.muted}}>AI finds 20+ winning products — filter, sort, and build your store</div>
      </div>

      {/* Category Pills */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
        {CATS.map(c=>(
          <button key={c.id} onClick={()=>setCat(c.id)} style={{
            padding:"9px 16px",borderRadius:10,
            border:`1px solid ${cat===c.id?C.green+"60":C.border}`,
            background:cat===c.id?`${C.green}18`:C.card,
            color:cat===c.id?C.green:C.muted,
            fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .15s"}}>
            {c.icon} {c.label}</button>
        ))}
      </div>

      {/* Action bar */}
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <Btn onClick={onGenerate} disabled={!cat||loading} style={{flex:"0 0 auto"}}>
          {loading?"⏳ AI is searching...":"🔍 Find 20 Products"}</Btn>
        {products.length>0&&(
          <Btn onClick={onMore} disabled={loading} color={C.purple} style={{flex:"0 0 auto"}}>
            {loading?"⏳":"➕ Load 10 More"}</Btn>
        )}
        <button onClick={()=>setShowFilters(f=>!f)}
          style={{padding:"11px 18px",borderRadius:12,border:`1px solid ${showFilters||activeFilters>0?C.gold+"60":C.border}`,
            background:activeFilters>0?`${C.gold}15`:C.card,color:activeFilters>0?C.gold:C.muted,
            fontSize:13,fontWeight:700,cursor:"pointer",transition:"all .15s",display:"flex",alignItems:"center",gap:8}}>
          🎛️ Filters {activeFilters>0&&<span style={{background:C.gold,color:"#000",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:800}}>{activeFilters}</span>}
        </button>
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
          style={{padding:"11px 14px",borderRadius:12,border:`1px solid ${C.border}`,
            background:C.card,color:C.text,fontSize:12,outline:"none",cursor:"pointer"}}>
          <option value="wow">Sort: WOW Score</option>
          <option value="trend">Sort: Trend Score</option>
          <option value="margin">Sort: Profit Margin %</option>
          <option value="profit">Sort: Profit €</option>
        </select>
      </div>

      {/* Filter Panel */}
      {showFilters&&(
        <div style={{background:`${C.gold}08`,border:`1px solid ${C.gold}25`,borderRadius:16,
          padding:"18px 20px",marginBottom:18,animation:"fadeUp .2s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:16,color:C.gold,letterSpacing:1}}>FILTER PRODUCTS</div>
            {activeFilters>0&&<button onClick={()=>{setMinWow(0);setMinProfit(0);setMinMargin(0);}}
              style={{fontSize:11,color:C.muted,background:"none",border:"none",cursor:"pointer"}}>✕ Clear all</button>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:16}}>
            {[
              {label:"Min WOW Score",val:minWow,set:setMinWow,min:0,max:10,color:C.green,unit:"/10"},
              {label:"Min Profit Margin",val:minMargin,set:setMinMargin,min:0,max:80,color:C.purple,unit:"%"},
              {label:"Min Profit Amount",val:minProfit,set:setMinProfit,min:0,max:100,color:C.gold,unit:"€"},
            ].map(({label,val,set,min,max,color,unit})=>(
              <div key={label}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:12,color:C.muted,fontWeight:600}}>{label}</span>
                  <span style={{fontSize:12,color,fontWeight:700}}>{val>0?`${val}${unit}`:"Any"}</span>
                </div>
                <input type="range" min={min} max={max} value={val} onChange={e=>set(+e.target.value)}
                  style={{width:"100%",accentColor:color}}/>
              </div>
            ))}
          </div>
          {products.length>0&&(
            <div style={{marginTop:14,fontSize:12,color:C.muted}}>
              Showing <strong style={{color:C.text}}>{filtered.length}</strong> of <strong style={{color:C.text}}>{products.length}</strong> products
              {activeFilters>0&&<span style={{color:C.gold}}> (filtered)</span>}
            </div>
          )}
        </div>
      )}

      {error&&<div style={{color:C.red,fontSize:13,marginBottom:14,padding:"12px 16px",
        background:`${C.red}0d`,border:`1px solid ${C.red}25`,borderRadius:12}}>{error}</div>}

      {loading&&products.length===0&&<div style={{display:"flex",justifyContent:"center",padding:60}}><Spin size={48}/></div>}

      {!loading&&products.length===0&&!error&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
          <div style={{fontSize:44,marginBottom:12}}>🔍</div>
          <div style={{fontSize:14,marginBottom:8}}>Pick a category and find 20 winning products</div>
          <div style={{fontSize:12}}>AI analyzes trending products across the Dutch/European market</div>
        </div>
      )}

      {filtered.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
          {filtered.map((p,i)=>(
            <PCard key={p.name+i} p={p} selected={selected.some(s=>s.name===p.name)}
              onToggle={()=>onToggle(p)} onDetail={()=>onDetail(p)}/>
          ))}
        </div>
      )}

      {filtered.length===0&&products.length>0&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:C.muted}}>
          <div style={{fontSize:36,marginBottom:10}}>🎛️</div>
          <div style={{fontSize:14}}>No products match your filters. Try lowering the minimums.</div>
        </div>
      )}

      {selected.length>0&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
          background:"#0e1525",border:`1px solid ${C.green}40`,borderRadius:16,
          padding:"14px 24px",display:"flex",alignItems:"center",gap:16,
          boxShadow:"0 8px 40px rgba(0,0,0,.7)",zIndex:100,animation:"fadeUp .3s ease"}}>
          <div style={{fontSize:13,color:C.text,fontWeight:600}}>
            <span style={{color:C.green,fontWeight:800}}>{selected.length}</span> products selected
            {selected.length<5&&<span style={{color:C.muted}}> (need {5-selected.length} more)</span>}
          </div>
          {selected.length>=5&&<div style={{fontSize:12,color:C.green}}>✓ Ready to build store!</div>}
        </div>
      )}
    </div>
  );
};

// ── CHECKOUT ──────────────────────────────────────────────────────────────────
const Checkout=({cart,onBack,onComplete,addToast})=>{
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({name:"",email:"",address:"",city:"",zip:"",country:"NL"});
  const [pay,setPay]=useState("ideal");
  const [loading,setLoading]=useState(false);
  const total=cart.reduce((s,p)=>s+(p.sellPrice||0),0);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));

  const doPayment=()=>{
    setLoading(true);
    setTimeout(()=>{
      DB.addOrder({total,items:cart.length,user:form.email,products:cart.map(p=>p.name)});
      const nb=(LS.get("dai_bal",0))+total*0.3;
      LS.set("dai_bal",nb);
      addToast({msg:`Order placed! €${total.toFixed(2)} paid.`,icon:"🎉",color:C.green});
      PUSH("DropAI – New Order!",`${form.name} ordered €${total.toFixed(2)}!`);
      setLoading(false);onComplete();
    },1800);
  };

  const fi=(ph,k,type="text")=>(
    <input value={form[k]} onChange={e=>upd(k,e.target.value)} placeholder={ph} type={type}
      style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,
        background:"rgba(255,255,255,0.05)",color:C.text,fontSize:13,outline:"none",marginBottom:10}}/>
  );

  return(
    <div style={{padding:"28px 24px 80px",maxWidth:560}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
        <Btn sm onClick={onBack} color={C.muted}>← Back</Btn>
        <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:28,color:C.text,letterSpacing:2}}>CHECKOUT</div>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:20,marginBottom:18}}>
        <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:14,color:C.muted,letterSpacing:1,marginBottom:12}}>ORDER SUMMARY</div>
        {cart.map((p,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:14,color:C.text}}>{p.emoji} {p.name}</span>
            <span style={{fontSize:14,color:C.gold,fontWeight:700}}>€{p.sellPrice}</span>
          </div>
        ))}
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12,marginTop:8,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:15,fontWeight:700,color:C.text}}>Total</span>
          <span style={{fontSize:18,fontWeight:800,color:C.green}}>€{total.toFixed(2)}</span>
        </div>
      </div>
      {step===1&&<>
        <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:18,color:C.text,letterSpacing:1,marginBottom:14}}>SHIPPING DETAILS</div>
        {fi("Full name","name")}
        {fi("Email address","email","email")}
        {fi("Street + house number","address")}
        {fi("Postal code","zip")}
        {fi("City","city")}
        <Btn full onClick={()=>setStep(2)} disabled={!form.name||!form.email||!form.address}
          style={{marginTop:4,fontSize:14,padding:"13px"}}>Continue to Payment →</Btn>
      </>}
      {step===2&&<>
        <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:18,color:C.text,letterSpacing:1,marginBottom:14}}>PAYMENT METHOD</div>
        {[{id:"ideal",icon:"🏦",label:"iDEAL",sub:"Direct bank transfer"},
          {id:"card",icon:"💳",label:"Credit Card",sub:"Visa, Mastercard, Amex"},
          {id:"paypal",icon:"🔵",label:"PayPal",sub:"Safe online payment"},
          {id:"klarna",icon:"🟣",label:"Klarna",sub:"Buy now, pay later"},
        ].map(m=>(
          <div key={m.id} onClick={()=>setPay(m.id)}
            style={{background:pay===m.id?"rgba(0,230,118,0.08)":C.card,
              border:`1px solid ${pay===m.id?C.green+"50":C.border}`,
              borderRadius:12,padding:"14px 18px",cursor:"pointer",marginBottom:10,
              display:"flex",alignItems:"center",gap:14,transition:"all .15s"}}>
            <div style={{fontSize:22}}>{m.icon}</div>
            <div>
              <div style={{fontSize:14,fontWeight:600,color:C.text}}>{m.label}</div>
              <div style={{fontSize:12,color:C.muted}}>{m.sub}</div>
            </div>
            {pay===m.id&&<div style={{marginLeft:"auto",color:C.green,fontWeight:800}}>✓</div>}
          </div>
        ))}
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <Btn sm onClick={()=>setStep(1)} color={C.muted}>← Back</Btn>
          <Btn full onClick={doPayment} disabled={loading} style={{fontSize:14,padding:"13px"}}>
            {loading?"⏳ Processing...":"💳 Pay Now →"}</Btn>
        </div>
      </>}
    </div>
  );
};

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>LS.get("dai_session",null));
  const [screen,setScreen]=useState("home");
  const [cat,setCat]=useState(null);
  const [products,setProducts]=useState([]);
  const [loadProd,setLoadProd]=useState(false);
  const [selected,setSelected]=useState([]);
  const [modal,setModal]=useState(null);
  const [related,setRelated]=useState([]);
  const [loadRel,setLoadRel]=useState(false);
  const [storeData,setStoreData]=useState(null);
  const [loadStore,setLoadStore]=useState(false);
  const [storeTab,setStoreTab]=useState("shop");
  const [pexelsKey,setPexelsKey]=useState(()=>localStorage.getItem("dai_pkey")||"");
  const [videos,setVideos]=useState([]);
  const [loadVid,setLoadVid]=useState(false);
  const [error,setError]=useState("");
  const [toasts,setToasts]=useState([]);

  const toast=useCallback(t=>{
    const id=Date.now();
    setToasts(p=>[...p,{...t,id}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),4000);
  },[]);

  const login=u=>{LS.set("dai_session",u);setUser(u);setScreen(u.role==="admin"?"dashboard":"home");PUSH("DropAI","Welcome back, "+u.name+"! 🚀");};
  const logout=()=>{LS.set("dai_session",null);setUser(null);setScreen("home");};
  const togSel=useCallback(p=>setSelected(prev=>prev.some(s=>s.name===p.name)?prev.filter(s=>s.name!==p.name):[...prev,p]),[]);

  // Generate 20 products in 2 batches of 10
  const genProducts=async()=>{
    if(!cat)return;
    setLoadProd(true);setProducts([]);setError("");
    try{
      const lbl=CATS.find(c=>c.id===cat)?.label||cat;
      const [batch1,batch2]=await Promise.all([
        API(`Generate 10 unique trending dropshipping products in the "${lbl}" niche for the European market. Focus on high wow-factor, viral potential, and strong profit margins. Return a JSON array of 10 objects with: name (English product name), emoji, tagline (English, punchy, max 10 words), description (English, 2 sentences, sales-focused), buyPrice (realistic AliExpress EUR cost), sellPrice (realistic retail EUR price), profitMargin (integer 0-80), wowScore (integer 1-10), trendScore (integer 1-10), keywords (array of 3 specific Pexels video search terms for this product type), upsellTip (English, 1 sentence about how to sell/bundle this product).`),
        API(`Generate 10 MORE unique trending dropshipping products in the "${lbl}" niche for the European market. These must be DIFFERENT from common ones — focus on surprising, niche, or viral items. Return a JSON array of 10 objects with: name, emoji, tagline (English max 10 words), description (English 2 sentences), buyPrice (EUR), sellPrice (EUR), profitMargin (integer 0-80), wowScore (integer 1-10), trendScore (integer 1-10), keywords (array of 3 Pexels search terms), upsellTip (English 1 sentence).`),
      ]);
      const all=[...(Array.isArray(batch1)?batch1:batch1.products||[]),
                 ...(Array.isArray(batch2)?batch2:batch2.products||[])];
      setProducts(all.slice(0,20));
    }catch(e){setError("Generation failed: "+e.message+". Check your API connection.");}
    setLoadProd(false);
  };

  const loadMore=async()=>{
    if(!cat||loadProd)return;
    setLoadProd(true);setError("");
    try{
      const existing=products.map(p=>p.name).join(", ");
      const lbl=CATS.find(c=>c.id===cat)?.label||cat;
      const data=await API(`Generate 10 MORE trending dropshipping products in "${lbl}" niche. DO NOT include any of these (already shown): ${existing}. Find completely different, unique products. JSON array of 10: name, emoji, tagline (English max 10 words), description (English 2 sentences), buyPrice (EUR), sellPrice (EUR), profitMargin (integer), wowScore (1-10), trendScore (1-10), keywords (3 Pexels search terms array), upsellTip (1 sentence).`);
      const more=Array.isArray(data)?data:data.products||[];
      setProducts(prev=>[...prev,...more]);
    }catch(e){setError("Failed to load more: "+e.message);}
    setLoadProd(false);
  };

  const openModal=async p=>{
    setModal(p);setRelated([]);setLoadRel(true);
    try{
      const data=await API(`I'm selling "${p.name}" (${p.tagline}). Generate 6 products that bundle or upsell perfectly with it — things customers would naturally buy together, accessories, complementary items, or starter kits. Return JSON array of 6 objects: name, emoji, tagline (English max 8 words), buyPrice (EUR), sellPrice (EUR), profitMargin (integer), wowScore (1-10), trendScore (1-10), bundleReason (2-3 word label like "Bundle Deal" or "Add-On"), whyPairs (English 1 sentence explaining why it pairs well with ${p.name}).`);
      setRelated(Array.isArray(data)?data:[]);
    }catch(e){}
    setLoadRel(false);
  };

  const genStore=async()=>{
    if(selected.length<5)return;
    setLoadStore(true);setStoreData(null);setError("");setStoreTab("shop");
    try{
      const names=selected.map(p=>p.name).join(", ");
      const data=await API(`Create a complete English online dropshipping store for these products: ${names}. Return JSON: storeName (catchy English brand name 1-2 words), tagline (English slogan max 8 words, punchy), niche (2-3 words describing the store's niche), targetAudience (who this store targets, 3-5 words), brandStory (English, 2-3 compelling sentences about the brand), colorScheme ({primary: bold hex color, secondary: accent hex color}), productDescriptions (object mapping each exact product name to an English 2-sentence sales description with benefits), faqs (array of 4 objects: {question, answer} in English, realistic e-commerce questions).`);
      setStoreData(data);setScreen("store");
    }catch(e){setError("Store generation failed: "+e.message);}
    setLoadStore(false);
  };

  // FIXED: Better Pexels video fetching with fallbacks
  const fetchVideos=async()=>{
    if(!pexelsKey.trim()||selected.length===0)return;
    localStorage.setItem("dai_pkey",pexelsKey.trim());
    setLoadVid(true);setVideos([]);setError("");
    try{
      const cat=CATS.find(c=>selected.some(p=>p.keywords?.some(k=>k)))
      // Build diverse keyword list from product names + keywords + category defaults
      const productKws=selected.flatMap(p=>p.keywords||[]).filter(Boolean);
      const productNames=selected.map(p=>p.name.split(" ")[0]); // first word of product name
      const catKws=CATS.flatMap(c=>c.kws||[]).slice(0,3);
      // Deduplicate and pick best queries
      const allKws=[...new Set([...productKws,...productNames])].slice(0,8);
      // Fallback generic queries if product keywords are empty
      const queries=allKws.length>0?allKws:["product unboxing","online shopping","lifestyle products","trending gadgets","tiktok products"];

      const allVids=[];
      const errors=[];
      for(const kw of queries.slice(0,6)){
        try{
          const vids=await PEXELS(kw,pexelsKey.trim(),3);
          allVids.push(...vids);
        }catch(e){
          errors.push(kw);
        }
      }

      // If all product queries failed, try generic fallbacks
      if(allVids.length===0){
        const fallbacks=["lifestyle product","online shopping","trending item","modern gadget","home product"];
        for(const fb of fallbacks){
          try{const v=await PEXELS(fb,pexelsKey.trim(),4);allVids.push(...v);if(allVids.length>8)break;}catch{}
        }
      }

      const unique=allVids.filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i).slice(0,20);
      if(unique.length===0)throw new Error("No videos found. Check your Pexels API key at pexels.com/api/");
      setVideos(unique);
      toast({msg:`Loaded ${unique.length} videos for your products!`,icon:"📱",color:C.purple});
    }catch(e){
      setError(e.message||"Pexels error. Make sure your API key is correct.");
    }
    setLoadVid(false);
  };

  if(!user)return<Auth onLogin={login}/>;

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",color:C.text}}>
      <Toast toasts={toasts}/>
      {screen!=="home"&&<Sidebar screen={screen} setScreen={setScreen} selected={selected} user={user} onLogout={logout}/>}
      <div style={{flex:1,overflowY:"auto",minHeight:"100vh"}}>
        {screen==="home"&&<Home onStart={()=>setScreen("discover")} user={user}/>}
        {screen==="dashboard"&&user?.role==="admin"&&<Dashboard addToast={toast}/>}
        {screen==="discover"&&<Discover cat={cat} setCat={setCat} products={products}
          loading={loadProd} selected={selected} onToggle={togSel} onDetail={openModal}
          onGenerate={genProducts} onMore={loadMore} error={error}/>}
        {screen==="selection"&&<Selection selected={selected}
          onRemove={p=>setSelected(prev=>prev.filter(s=>s.name!==p.name))}
          onBuildStore={()=>{setScreen("store");genStore();}}/>}
        {screen==="store"&&<Store selected={selected} storeData={storeData}
          loading={loadStore} tab={storeTab} setTab={setStoreTab}
          onGenerate={()=>{setScreen("store");genStore();}} onRegenerate={genStore} addToast={toast}/>}
        {screen==="videos"&&<Videos selected={selected} pexelsKey={pexelsKey} setPexelsKey={setPexelsKey}
          videos={videos} loading={loadVid} onFetch={fetchVideos} error={error}/>}
      </div>
      {modal&&<PModal product={modal} related={related} loadRel={loadRel}
        selected={selected.some(s=>s.name===modal.name)} selAll={selected}
        onToggle={()=>togSel(modal)} onAddRel={p=>togSel(p)} onClose={()=>setModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
document.getElementById("boot").style.display="none";
</script>
</body>
</html>
